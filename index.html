<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src https://gist.githubusercontent.com; img-src 'self' data:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushant's Daily Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0f0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1a3e 0%, #0d0d2b 100%); padding: 28px 40px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #7c8cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .date { color: #8888aa; font-size: 14px; }
  .header .refresh-note { color: #666680; font-size: 12px; margin-top: 4px; }

  .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 30px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 4px; width: fit-content; }
  .tab { padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: #8888aa; transition: all 0.2s; border: none; background: none; }
  .tab.active { background: rgba(124,140,248,0.15); color: #7c8cf8; }
  .tab:hover:not(.active) { color: #b0b0cc; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Cards */
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px; }
  .metric-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 22px; position: relative; overflow: hidden; }
  .metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent, #7c8cf8), transparent); }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: #8888aa; margin-bottom: 8px; }
  .metric-value { font-size: 32px; font-weight: 700; color: #f0f0ff; }
  .metric-change { font-size: 13px; margin-top: 4px; font-weight: 500; }
  .metric-change.positive { color: #4ade80; }
  .metric-change.negative { color: #f87171; }
  .metric-change.neutral { color: #8888aa; }
  .metric-sub { font-size: 11px; color: #666680; margin-top: 2px; }

  /* Charts */
  .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
  .chart-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; }
  .chart-card h3 { font-size: 15px; font-weight: 600; color: #c0c0dd; margin-bottom: 16px; }
  .chart-card canvas { max-height: 280px; }

  /* Status Cards */
  .status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .status-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; }
  .status-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-live { background: rgba(74,222,128,0.15); color: #4ade80; }
  .badge-review { background: rgba(250,204,21,0.15); color: #facc15; }
  .badge-prep { background: rgba(124,140,248,0.15); color: #7c8cf8; }

  /* Strategy Section */
  .strategy-section { margin-top: 32px; }
  .strategy-section h2 { font-size: 20px; font-weight: 700; color: #c0c0dd; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .strategy-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .strategy-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; transition: border-color 0.3s; }
  .strategy-card:hover { border-color: rgba(124,140,248,0.3); }
  .strategy-card .priority { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px; }
  .priority-high { color: #f87171; }
  .priority-medium { color: #facc15; }
  .priority-low { color: #4ade80; }
  .strategy-card h4 { font-size: 16px; font-weight: 600; color: #e0e0f0; margin-bottom: 8px; }
  .strategy-card p { font-size: 13px; color: #8888aa; line-height: 1.6; }
  .strategy-card .impact { margin-top: 12px; font-size: 12px; color: #7c8cf8; font-weight: 500; }

  /* Data Table */
  .data-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .data-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666680; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .data-table td { padding: 10px 12px; font-size: 13px; color: #b0b0cc; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .data-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* Funnel */
  .funnel { display: flex; flex-direction: column; gap: 2px; margin-top: 12px; }
  .funnel-step { display: flex; align-items: center; gap: 14px; }
  .funnel-bar { height: 36px; border-radius: 6px; display: flex; align-items: center; padding: 0 14px; font-size: 13px; font-weight: 600; color: #fff; min-width: 60px; }
  .funnel-label { font-size: 12px; color: #8888aa; min-width: 140px; }
  .funnel-value { font-size: 13px; font-weight: 600; color: #e0e0f0; }

  /* MealSight pending panel */
  .pending-panel { background: linear-gradient(135deg, rgba(250,204,21,0.05), rgba(250,204,21,0.02)); border: 1px solid rgba(250,204,21,0.15); border-radius: 16px; padding: 32px; text-align: center; }
  .pending-panel h3 { font-size: 18px; color: #facc15; margin-bottom: 8px; }
  .pending-panel p { color: #8888aa; font-size: 14px; line-height: 1.6; }
  .pending-icon { font-size: 48px; margin-bottom: 16px; }

  /* Insights Callout */
  .insight-callout { background: linear-gradient(135deg, rgba(124,140,248,0.08), rgba(167,139,250,0.04)); border: 1px solid rgba(124,140,248,0.2); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
  .insight-callout h3 { color: #a78bfa; font-size: 14px; margin-bottom: 10px; font-weight: 600; }
  .insight-callout p { color: #b0b0cc; font-size: 13px; line-height: 1.7; }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 400px; flex-direction: column; gap: 16px; }
  .loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(124,140,248,0.2); border-top-color: #7c8cf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: #8888aa; font-size: 14px; }
  .error-msg { color: #f87171; text-align: center; padding: 40px; font-size: 14px; }

  @media (max-width: 900px) {
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-row, .status-row, .strategy-grid { grid-template-columns: 1fr; }
    .container { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Sushant's Daily Dashboard</h1>
    <div class="date" id="currentDate"></div>
    <div class="refresh-note" id="dataPeriod">Loading data...</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:13px;color:#8888aa;">Sushant Wason</div>
    <div style="font-size:11px;color:#666680;">App Store Connect</div>
  </div>
</div>

<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('patchpal')">PatchPal</button>
    <button class="tab" onclick="switchTab('mealsight')">MealSight</button>
    <button class="tab" onclick="switchTab('strategy')">Growth Strategy</button>
  </div>

  <!-- Loading State -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading dashboard data...</p>
  </div>

  <!-- Error State -->
  <div id="error" class="error-msg" style="display:none"></div>

  <!-- ============ PATCHPAL TAB ============ -->
  <div class="tab-content active" id="tab-patchpal" style="display:none">

    <!-- Last 24h Snapshot -->
    <div class="metric-grid" style="margin-bottom:20px" id="snapshot24h"></div>

    <!-- Key Insight -->
    <div class="insight-callout" id="keyInsight">
      <h3>Key Insight</h3>
      <p id="keyInsightText"></p>
    </div>

    <!-- Metric Cards -->
    <div class="metric-grid" id="metricsRow1"></div>
    <div class="metric-grid" id="metricsRow2"></div>

    <!-- Conversion Funnel -->
    <div class="chart-card" style="margin-bottom:24px" id="funnelCard">
      <h3>Conversion Funnel</h3>
      <div class="funnel" id="funnel"></div>
    </div>

    <!-- Charts Row -->
    <div class="chart-row">
      <div class="chart-card">
        <h3>Daily Downloads, Page Views & Sessions</h3>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Downloads by Source</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <h3>Downloads by Territory</h3>
        <canvas id="territoryChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Downloads by Device</h3>
        <canvas id="deviceChart"></canvas>
      </div>
    </div>

    <!-- App Status -->
    <div class="status-row" id="statusRow"></div>
  </div>

  <!-- ============ MEALSIGHT TAB ============ -->
  <div class="tab-content" id="tab-mealsight"></div>

  <!-- ============ STRATEGY TAB ============ -->
  <div class="tab-content" id="tab-strategy"></div>

</div>

<script>
  const GIST_URL = 'https://gist.githubusercontent.com/sushantwason/a4c54ade850bc740fdfe8bb583a85648/raw/data.json';

  // Date
  document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Tab switching
  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
  }

  // Chart.js defaults
  Chart.defaults.color = '#8888aa';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, SF Pro Display, sans-serif';

        // Security: sanitize HTML to prevent XSS
        function safeHTML(el, html) { el.innerHTML = DOMPurify.sanitize(html); }

  function classForChange(change) {
    if (!change || change === '0%') return 'neutral';
    if (change.startsWith('+')) return 'positive';
    if (change.startsWith('-')) {
      // For crashes, decrease is positive
      return 'positive';
    }
    return 'neutral';
  }

  function metricCard(label, value, change, sub, accent) {
    const cls = classForChange(change);
    return `<div class="metric-card" style="--accent:${accent}">
      <div class="metric-label">${label}</div>
      <div class="metric-value">${value}</div>
      <div class="metric-change ${cls}">${change || ''}</div>
      ${sub ? `<div class="metric-sub">${sub}</div>` : ''}
    </div>`;
  }

  function strategyCard(item) {
    const pClass = ['HIGH IMPACT','REVENUE','STABILITY','BEFORE APPROVAL'].includes(item.priority) ? 'priority-high' :
                   ['GROWTH','ENGAGEMENT','EXPANSION','SYNERGY','LAUNCH WEEK'].includes(item.priority) ? 'priority-medium' : 'priority-low';
    return `<div class="strategy-card">
      <div class="priority ${pClass}">${item.priority}</div>
      <h4>${item.title}</h4>
      <p>${item.description}</p>
      ${item.impact ? `<div class="impact">${item.impact}</div>` : ''}
    </div>`;
  }

  function renderDashboard(d) {
    const pp = d.patchpal;
    const ms = d.mealsight;
    const st = d.strategy;

    // Header
    document.getElementById('dataPeriod').textContent = `Data period: ${d.dataPeriod} \u00B7 Source: App Store Connect \u00B7 Updated: ${new Date(d.lastUpdated).toLocaleString()}`;

    // === PATCHPAL TAB ===

    // 24h Snapshot
    safeHTML(document.getElementById('snapshot24h'),
      `<div class="metric-card" style="--accent:#38bdf8;border:1px solid rgba(56,189,248,0.2)">
        <div class="metric-label">Installs (Last 24h)</div>
        <div class="metric-value">${pp.snapshot24h.installs}</div>
        <div class="metric-change neutral">${pp.snapshot24h.date}</div>
        <div class="metric-sub">7-day avg: ${pp.snapshot24h.installsAvg7d}/day</div>
      </div>
      <div class="metric-card" style="--accent:#a78bfa;border:1px solid rgba(167,139,250,0.2)">
        <div class="metric-label">App Opens (Last 24h)</div>
        <div class="metric-value">${pp.snapshot24h.sessions}</div>
        <div class="metric-change neutral">${pp.snapshot24h.date} (${pp.snapshot24h.sessionsNote})</div>
        <div class="metric-sub">7-day avg: ${pp.snapshot24h.sessionsAvg7d}/day</div>
      </div>
      <div class="metric-card" style="--accent:#4ade80;border:1px solid rgba(74,222,128,0.2)">
        <div class="metric-label">Avg Opens / User</div>
        <div class="metric-value">${pp.snapshot24h.avgOpensPerUser}</div>
        <div class="metric-change positive">${pp.snapshot24h.avgOpensChange}</div>
        <div class="metric-sub">${pp.snapshot24h.totalSessions} sessions &divide; ${pp.snapshot24h.activeDevices} active devices</div>
      </div>
      <div class="metric-card" style="--accent:#666680;border:1px solid rgba(102,102,128,0.2)">
        <div class="metric-label">Avg Session Duration</div>
        <div class="metric-value" style="font-size:22px;color:#666680">&mdash;</div>
        <div class="metric-change neutral">Not available</div>
        <div class="metric-sub">Requires Firebase / Mixpanel SDK</div>
      </div>`);

    // Key Insight
    document.getElementById('keyInsightText').textContent = pp.keyInsight;

    // Metrics Row 1
    const m = pp.metrics;
    safeHTML(document.getElementById('metricsRow1'),
      metricCard('Impressions', m.impressions.value, m.impressions.change, '', '#7c8cf8') +
      metricCard('Product Page Views', m.pageViews.value, m.pageViews.change, '', '#a78bfa') +
      metricCard('Conversion Rate', m.conversionRate.value, m.conversionRate.change, m.conversionRate.sub, '#4ade80') +
      metricCard('Total Downloads', m.totalDownloads.value, m.totalDownloads.change, '', '#38bdf8'));

    // Metrics Row 2
    safeHTML(document.getElementById('metricsRow2'),
      metricCard('Proceeds', m.proceeds.value, m.proceeds.change, '', '#f87171') +
      metricCard('Sessions / Active Device', m.sessionsPerDevice.value, m.sessionsPerDevice.change, m.sessionsPerDevice.sub, '#facc15') +
      metricCard('Crashes', m.crashes.value, m.crashes.change, '', '#f87171') +
      metricCard('Retention', m.retention.value, m.retention.change, m.retention.sub, '#4ade80'));

    // Funnel
    const f = pp.funnel;
    const pvPct = (f.pageViews / f.impressions * 100).toFixed(1);
    const dlPct = (f.downloads / f.pageViews * 100).toFixed(1);
    safeHTML(document.getElementById('funnel'),
      `<div class="funnel-step">
        <div class="funnel-label">Impressions</div>
        <div class="funnel-bar" style="width:100%;background:linear-gradient(90deg,#7c8cf8,#6366f1)">${f.impressions}</div>
      </div>
      <div class="funnel-step">
        <div class="funnel-label">Page Views</div>
        <div class="funnel-bar" style="width:${pvPct}%;background:linear-gradient(90deg,#a78bfa,#8b5cf6)">${f.pageViews}</div>
        <div class="funnel-value">${pvPct}% of impressions</div>
      </div>
      <div class="funnel-step">
        <div class="funnel-label">Downloads</div>
        <div class="funnel-bar" style="width:${(f.downloads / f.impressions * 100).toFixed(1)}%;background:linear-gradient(90deg,#4ade80,#22c55e)">${f.downloads}</div>
        <div class="funnel-value">${dlPct}% of page views</div>
      </div>`);

    // Charts
    const c = pp.charts;
    new Chart(document.getElementById('dailyChart'), {
      type: 'line',
      data: {
        labels: c.dates,
        datasets: [
          { label: 'Downloads', data: c.downloads, borderColor: '#7c8cf8', backgroundColor: 'rgba(124,140,248,0.1)', fill: true, tension: 0.3, pointRadius: 2 },
          { label: 'Page Views', data: c.pageViews, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.05)', fill: true, tension: 0.3, pointRadius: 2 },
          { label: 'Sessions', data: c.sessions, borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.05)', fill: false, tension: 0.3, pointRadius: 2, borderDash: [5,3] }
        ]
      },
      options: { responsive: true, plugins: { legend: { position: 'top', labels: { boxWidth: 12, padding: 16 } } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' } }, x: { grid: { display: false } } } }
    });

    const srcColors = ['#7c8cf8','#a78bfa','#4ade80','#38bdf8','#666680'];
    new Chart(document.getElementById('sourceChart'), {
      type: 'doughnut',
      data: { labels: pp.downloadsBySource.labels, datasets: [{ data: pp.downloadsBySource.data, backgroundColor: srcColors, borderWidth: 0 }] },
      options: { responsive: true, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12, font: { size: 11 } } } } }
    });

    const terrColors = ['#7c8cf8','#a78bfa','#4ade80','#38bdf8','#facc15'];
    new Chart(document.getElementById('territoryChart'), {
      type: 'bar',
      data: { labels: pp.downloadsByTerritory.labels, datasets: [{ label: 'Downloads', data: pp.downloadsByTerritory.data, backgroundColor: terrColors, borderRadius: 8, barThickness: 32 }] },
      options: { responsive: true, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' } }, y: { grid: { display: false } } } }
    });

    new Chart(document.getElementById('deviceChart'), {
      type: 'doughnut',
      data: { labels: pp.downloadsByDevice.labels, datasets: [{ data: pp.downloadsByDevice.data, backgroundColor: ['#7c8cf8','#a78bfa'], borderWidth: 0 }] },
      options: { responsive: true, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 12 } } } }
    });

    // App Status
    const s = pp.appStatus;
    const badgeClass = s.nextVersionStatus === 'Prepare for Submission' ? 'badge-prep' : s.nextVersionStatus === 'Waiting for Review' ? 'badge-review' : 'badge-live';
    safeHTML(document.getElementById('statusRow'),
      `<div class="status-card">
        <h3 style="color:#4ade80">PatchPal Status</h3>
        <table class="data-table">
          <tr><td>Current Live Version</td><td style="color:#e0e0f0;font-weight:600">${s.liveVersion}</td></tr>
          <tr><td>Next Version</td><td style="color:#e0e0f0;font-weight:600">${s.nextVersion} <span class="status-badge ${badgeClass}">${s.nextVersionStatus}</span></td></tr>
          <tr><td>Platform</td><td>${s.platform}</td></tr>
          <tr><td>Primary Device</td><td>${s.primaryDevice}</td></tr>
        </table>
      </div>
      <div class="status-card">
        <h3 style="color:#facc15">Daily Checklist</h3>
        <table class="data-table">
          <tr><td>1.</td><td>Check yesterday's downloads vs. 7-day average</td></tr>
          <tr><td>2.</td><td>Monitor crash count (target: 0)</td></tr>
          <tr><td>3.</td><td>Review App Store Search rankings</td></tr>
          <tr><td>4.</td><td>Check conversion rate trend</td></tr>
          <tr><td>5.</td><td>Respond to any new reviews</td></tr>
          <tr><td>6.</td><td>Check MealSight review status</td></tr>
        </table>
      </div>`);

    // === MEALSIGHT TAB ===
    if (ms.isLive) {
      safeHTML(document.getElementById('tab-mealsight'), '<div class="insight-callout"><h3>MealSight is Live!</h3><p>Analytics data will appear here once sufficient data is collected.</p></div>';
    } else {
      const msBadge = ms.status === 'Waiting for Review' ? 'badge-review' : ms.status === 'Ready for Sale' ? 'badge-live' : 'badge-prep';
      safeHTML(document.getElementById('tab-mealsight'),
        `<div class="pending-panel">
          <div class="pending-icon">&#9203;</div>
          <h3>${ms.appName}</h3>
          <p style="font-size:16px;margin-bottom:16px;">${ms.version} \u2014 ${ms.status}</p>
          <p>Submitted ${ms.submittedDate}. Apple typically reviews within 24-48 hours.</p>
          <div style="margin-top:24px;text-align:left;max-width:500px;margin-left:auto;margin-right:auto;">
            <table class="data-table">
              <tr><td>App Name</td><td style="color:#e0e0f0;font-weight:600">${ms.appName}</td></tr>
              <tr><td>Version</td><td>${ms.version}</td></tr>
              <tr><td>Status</td><td><span class="status-badge ${msBadge}">${ms.status}</span></td></tr>
              <tr><td>Submitted</td><td>${ms.submittedDate}</td></tr>
              <tr><td>Draft Submissions</td><td>${ms.draftSubmissions}</td></tr>
              <tr><td>Previous Attempts</td><td>${ms.previousAttempts}</td></tr>
            </table>
          </div>
        </div>
        <div class="strategy-section" style="margin-top:32px">
          <h2>Pre-Launch Checklist for MealSight</h2>
          <div class="strategy-grid">${(st.mealsightPreLaunch || []).map(strategyCard).join('')}</div>
        </div>`);
    }

    // === STRATEGY TAB ===
    safeHTML(document.getElementById('tab-strategy'),
      `<div class="insight-callout">
        <h3>Strategic Overview</h3>
        <p>${st.overview}</p>
      </div>
      <h2 style="font-size:18px;font-weight:700;color:#f87171;margin-bottom:16px;">Immediate Actions (This Week)</h2>
      <div class="strategy-grid" style="margin-bottom:32px">${st.immediate.map(strategyCard).join('')}</div>
      <h2 style="font-size:18px;font-weight:700;color:#facc15;margin-bottom:16px;">Medium-Term Plays (Next 2-4 Weeks)</h2>
      <div class="strategy-grid" style="margin-bottom:32px">${st.mediumTerm.map(strategyCard).join('')}</div>
      <h2 style="font-size:18px;font-weight:700;color:#4ade80;margin-bottom:16px;">Long-Term Vision (1-3 Months)</h2>
      <div class="strategy-grid">${st.longTerm.map(strategyCard).join('')}</div>`);
  }

  // Fetch and render
  fetch(GIST_URL + '?_=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('Failed to fetch data: ' + r.status);
      return r.json();
    })
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('tab-patchpal').style.display = 'block';
      renderDashboard(data);
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'Error loading dashboard data: ' + err.message + '. Please try refreshing.';
    });
</script>

</body>
</html>
